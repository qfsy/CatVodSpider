name: Spider Jar Gen CI

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    # 增加权限声明（双重保险）
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v3 # 升级到 v3

      - name: set up JDK 17
        uses: actions/setup-java@v3 # 升级到 v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Build with Gradle
        run: ./build.bat ec

      - name: Update spider jar
        uses: EndBug/add-and-commit@v9 # 升级到 v9
        with:
          default_author: github_actions
          message: 'update spider jar'
          add: "['./jar/pp.jar', './jar/pp.jar.md5']"
